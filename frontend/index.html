<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataNarrator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">📊 DataNarrator</span>
      <p class="tagline">Query your data — hear the story it tells.</p>
    </div>
  </header>

  <main class="container">
    <!-- ── query form ──────────────────────────────────────────────────── -->
    <section class="card" id="query-section">
      <h2>Ask a Question</h2>

      <label for="question-input">Your question</label>
      <input
        type="text"
        id="question-input"
        placeholder="e.g. What were the top 5 products by revenue last quarter?"
      />

      <label for="sql-input">SQL query</label>
      <textarea
        id="sql-input"
        rows="5"
        placeholder="SELECT product, SUM(revenue) AS total_revenue
FROM sales
WHERE quarter = 'Q4'
GROUP BY product
ORDER BY total_revenue DESC
LIMIT 5;"
      ></textarea>

      <button id="narrate-btn" class="btn-primary">
        <span id="btn-label">▶ Narrate</span>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>

      <p id="error-msg" class="error-msg hidden"></p>
    </section>

    <!-- ── results ────────────────────────────────────────────────────── -->
    <section class="card hidden" id="results-section">
      <h2>Narrative</h2>
      <p id="narrative-text" class="narrative"></p>

      <div class="audio-player">
        <button id="play-btn" class="btn-secondary">▶ Play</button>
        <button id="pause-btn" class="btn-secondary hidden">⏸ Pause</button>
        <audio id="audio-element"></audio>
      </div>

      <h3>Data Preview</h3>
      <div class="table-wrapper">
        <table id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    Built for the <strong>MLH AI Hackfest</strong> · Powered by Snowflake · Gemini · ElevenLabs
  </footer>

  <script src="app.js"></script>
</body>
</html>
