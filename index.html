<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataNarrator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #13131a;
            --bg-insight: #1a1a24;
            --accent-teal: #4f98a3;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #2a2a35;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-svg {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-top: 0.5rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* Upload Section */
        #upload-section {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 4rem 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: rgba(26, 26, 36, 0.5);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-teal);
            background-color: rgba(79, 152, 163, 0.1);
        }

        .drop-zone p {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        #file-name {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: var(--accent-teal);
            min-height: 1.5rem;
        }

        button {
            background-color: var(--accent-teal);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
            font-family: 'Inter', sans-serif;
        }

        button:hover:not(:disabled) {
            background-color: #3b767f;
        }

        button:disabled {
            background-color: #2a2a35;
            color: #666;
            cursor: not-allowed;
        }

        button.secondary-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 100%;
            margin-top: 2rem;
        }

        button.secondary-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Loading State */
        #loading-section {
            text-align: center;
            padding: 4rem 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 152, 163, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-teal);
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        .spinner-small {
            width: 24px;
            height: 24px;
            border-width: 2px;
            margin: 0 1rem 0 0;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Results Panel */
        #results-section {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .metadata {
            display: flex;
            gap: 0.5rem;
        }

        .chip {
            background-color: rgba(79, 152, 163, 0.15);
            color: var(--accent-teal);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .insight-box {
            background-color: var(--bg-insight);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 3px solid var(--accent-teal);
            font-size: 1.2rem;
            line-height: 1.8;
            margin: 0;
        }

        .audio-container {
            margin-top: 0.5rem;
        }

        .audio-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        audio {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            outline: none;
        }

        audio::-webkit-media-controls-panel {
            background-color: #2a2a35;
        }

        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #ffffff;
        }

        #chart-container {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        /* Tech Stack Badges */
        .tech-stack-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            margin-top: 1rem;
        }

        /* Follow-up */
        .followup-section {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .followup-section h3 {
            margin-top: 0;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }

        .input-group button {
            margin-top: 0;
            width: auto;
        }

        #followup-loading {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            color: var(--text-muted);
        }

        #followup-result {
            margin-top: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            #results-section { padding: 1.5rem 1rem; }
            .input-group { flex-direction: column; }
            .input-group button { width: 100%; }
            .drop-zone { padding: 3rem 1rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <svg class="logo-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="64" height="64" rx="16" fill="rgba(79, 152, 163, 0.1)"/>
                <path d="M20 32L20 44" stroke="#4f98a3" stroke-width="4" stroke-linecap="round"/>
                <path d="M28 20L28 44" stroke="#4f98a3" stroke-width="4" stroke-linecap="round"/>
                <path d="M36 28L36 44" stroke="#4f98a3" stroke-width="4" stroke-linecap="round"/>
                <path d="M44 36L44 44" stroke="#4f98a3" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <h1>DataNarrator</h1>
            <p class="subtitle">Turn any CSV into an AI voice briefing — powered by Gemini & ElevenLabs</p>
        </header>

        <!-- Upload Section -->
        <div id="upload-section">
            <div id="drop-zone" class="drop-zone">
                <p>Drop your CSV here or click to browse</p>
                <input type="file" id="file-input" accept=".csv" hidden>
            </div>
            <p id="file-name"></p>
            <button id="analyze-btn" disabled>Analyze</button>
        </div>

        <!-- Loading State -->
        <div id="loading-section" class="hidden">
            <div class="spinner"></div>
            <p id="loading-text">📊 Storing in Supabase...</p>
        </div>

        <!-- Results Panel -->
        <div id="results-section" class="hidden">
            <div class="metadata">
                <span class="chip" id="row-count"></span>
                <span class="chip" id="col-count"></span>
            </div>
            
            <p id="insight-text" class="insight-box"></p>

            <div id="insight-audio-container" class="audio-container" style="display:none;">
                <span class="audio-label">🎙️ AI Voice Briefing</span>
                <audio id="insight-audio" controls style="display:block; width:100%;"></audio>
            </div>

            <div id="chart-container" style="display:none;">
                <p class="audio-label">📊 Auto-Generated Chart</p>
                <canvas id="insight-chart" style="max-height:280px;"></canvas>
            </div>

            <div class="tech-stack-row">
                <span class="chip">Gemini 2.5 Flash</span>
                <span class="chip">Google Cloud TTS</span>
                <span class="chip">Supabase</span>
            </div>

            <div class="followup-section">
                <h3>Ask a follow-up question</h3>
                <div class="input-group">
                    <input type="text" id="followup-input" placeholder="Type your question...">
                    <button id="followup-btn">Submit</button>
                </div>
                
                <div id="followup-loading" class="hidden">
                    <div class="spinner spinner-small"></div>
                    <p>Generating answer...</p>
                </div>

                <div id="followup-result" class="hidden">
                    <p id="followup-answer" class="insight-box" style="font-size: 1rem; padding: 1rem; margin-bottom: 1rem;"></p>
                    <div class="audio-container">
                        <audio id="followup-audio" controls autoplay style="display:none;"></audio>
                    </div>
                </div>
            </div>

            <button id="reset-btn" class="secondary-btn">Analyze another file</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = "";

        function showError(message) {
            let banner = document.getElementById('error-banner');
            if (!banner) {
                banner = document.createElement('div');
                banner.id = 'error-banner';
                banner.style.cssText = 'background:#2d1a1a;border:1px solid #7a3030;color:#f08080;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;font-size:0.95rem;';
                uploadSection.parentNode.insertBefore(banner, uploadSection);
            }
            banner.textContent = '⚠️ ' + message;
            banner.style.display = 'block';
            uploadSection.classList.remove('hidden');
        }

        function clearError() {
            const banner = document.getElementById('error-banner');
            if (banner) banner.style.display = 'none';
        }


        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const analyzeBtn = document.getElementById('analyze-btn');
        const uploadSection = document.getElementById('upload-section');
        const loadingSection = document.getElementById('loading-section');
        const loadingText = document.getElementById('loading-text');
        const resultsSection = document.getElementById('results-section');
        const rowCount = document.getElementById('row-count');
        const colCount = document.getElementById('col-count');
        const insightText = document.getElementById('insight-text');
        const insightAudio = document.getElementById('insight-audio');
        const followupInput = document.getElementById('followup-input');
        const followupBtn = document.getElementById('followup-btn');
        const followupLoading = document.getElementById('followup-loading');
        const followupResult = document.getElementById('followup-result');
        const followupAnswer = document.getElementById('followup-answer');
        const followupAudio = document.getElementById('followup-audio');
        const resetBtn = document.getElementById('reset-btn');

        let selectedFile = null;
        let currentInsight = "";
        let loadingInterval;

        const loadingMessages = [
            "📊 Storing in Supabase...",
            "🤖 Gemini analyzing...",
            "🎙️ Generating voice with ElevenLabs..."
        ];

        // Drag & Drop
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function formatBytes(bytes) {
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function handleFileSelect(file) {
            if (!file.name.endsWith('.csv')) {
                showError('Please upload a CSV file (.csv)');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showError('File too large. Maximum size is 10MB.');
                return;
            }
            clearError();
            selectedFile = file;
            fileNameDisplay.textContent = `Selected: ${file.name} (${formatBytes(file.size)})`;
            analyzeBtn.disabled = false;
        }

        // Loading states
        function startLoading() {
            uploadSection.classList.add('hidden');
            resultsSection.classList.add('hidden');
            loadingSection.classList.remove('hidden');
            let msgIndex = 0;
            loadingText.textContent = loadingMessages[0];
            loadingInterval = setInterval(() => {
                msgIndex = (msgIndex + 1) % loadingMessages.length;
                loadingText.textContent = loadingMessages[msgIndex];
            }, 3000);
        }
        function stopLoading() {
            clearInterval(loadingInterval);
            loadingSection.classList.add('hidden');
        }

        // Analyze
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            if (!selectedFile.name.endsWith('.csv')) {
                showError('Please upload a CSV file (.csv)');
                return;
            }
            if (selectedFile.size > 10 * 1024 * 1024) {
                showError('File too large. Maximum size is 10MB.');
                return;
            }
            startLoading();
            
            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                // Expected API contract
                const response = await fetch(`${BACKEND_URL}/analyze`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error("Analysis failed");
                const data = await response.json();

                if (!data.insight || data.insight === "Unable to generate insight.") {
                    showError("Gemini could not analyze this file. Try a different CSV or check back shortly.");
                    stopLoading();
                    return;
                }

                clearError();
                currentInsight = data.insight;
                insightText.textContent = currentInsight;
                insightText.classList.toggle('populated', Boolean(currentInsight));

                const insightAudioContainer = document.getElementById('insight-audio-container');
                if (data.audio_b64) {
                    insightAudioContainer.style.display = '';
                    insightAudio.src = `data:audio/mp3;base64,${data.audio_b64}`;
                    insightAudio.load();
                    insightAudio.play().catch(()=>{});
                } else {
                    insightAudioContainer.style.display = 'none';
                }

                rowCount.textContent = `${data.row_count || 0} Rows`;
                colCount.textContent = `${data.columns ? data.columns.length : 0} Columns`;

                const cd = data.chart_data;
                document.getElementById('chart-container').style.display = 'none';
                if (window.chartInstance) { window.chartInstance.destroy(); window.chartInstance = null; }
                if (cd && cd.labels && cd.labels.length > 0 && cd.values && cd.values.length > 0) {
                    document.getElementById('chart-container').style.display = 'block';
                    window.chartInstance = new Chart(document.getElementById('insight-chart'), {
                        type: cd.type,
                        data: {
                            labels: cd.labels,
                            datasets: [{
                                label: cd.title,
                                data: cd.values,
                                backgroundColor: ['#4f98a3','#3b767f','#2d5c63','#1e4a50','#6ab8c4','#82cad4','#9bd8e0','#b0e4eb'],
                                borderColor: '#4f98a3',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { labels: { color: '#ffffff', font: { family: 'Inter' } } } },
                            scales: {
                                x: { ticks: { color: '#a0a0a0' }, grid: { color: '#222' } },
                                y: { ticks: { color: '#a0a0a0' }, grid: { color: '#222' } }
                            }
                        }
                    });
                }
                
                stopLoading();
                resultsSection.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                showError("Something went wrong during analysis. Please try again.");
                stopLoading();
                uploadSection.classList.remove('hidden');
            }
        });

        // Follow-up
        followupBtn.addEventListener('click', async () => {
            const question = followupInput.value.trim();
            if (!question) return;

            followupBtn.disabled = true;
            followupResult.classList.add('hidden');
            followupLoading.classList.remove('hidden');

            try {
                // Expected API contract
                const response = await fetch(`${BACKEND_URL}/followup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ insight: currentInsight, question })
                });
                
                if (!response.ok) throw new Error("Follow-up failed");
                const data = await response.json();
                
                followupAnswer.textContent = data.answer && data.answer.trim()
                    ? data.answer
                    : "Could not get an answer. Please try rephrasing your question.";
                followupLoading.classList.add('hidden');
                followupResult.classList.remove('hidden');

                if (data.audio_b64 && data.answer && data.answer.trim()) {
                    followupAudio.style.display = '';
                    followupAudio.src = `data:audio/mp3;base64,${data.audio_b64}`;
                    followupAudio.load();
                    followupAudio.play().catch(() => {});
                } else {
                    followupAudio.style.display = 'none';
                }
            } catch (error) {
                console.error(error);
                showError("Something went wrong. Please try again.");
                followupLoading.classList.add('hidden');
            } finally {
                followupBtn.disabled = false;
            }
        });

        followupInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') followupBtn.click();
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileNameDisplay.textContent = "";
            fileInput.value = "";
            analyzeBtn.disabled = true;
            followupInput.value = "";
            followupResult.classList.add('hidden');
            resultsSection.classList.add('hidden');
            uploadSection.classList.remove('hidden');

            document.getElementById('chart-container').style.display = 'none';
            if (window.chartInstance) {
                window.chartInstance.destroy();
                window.chartInstance = null;
            }

            document.getElementById('insight-audio-container').style.display = 'none';
            if (insightAudio) insightAudio.pause();
            if (followupAudio) { followupAudio.pause(); followupAudio.style.display = 'none'; }
        });
    </script>
</body>
</html>
